const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// NEW: Load gigs from the new 'gigs' table (Migration 003)
async function loadGigs() {
    const container = document.getElementById('gigs-container');
    container.innerHTML = `<p class="text-slate-500 italic col-span-3 py-8 text-center"><span class="spinner mr-2"></span> Syncing live safety opportunities…</p>`;

    try {
        const { data, error } = await db
            .from('gigs')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(12);

        if (error) throw error;

        if (!data || data.length === 0) {
            container.innerHTML = `<p class="text-slate-400 italic col-span-3 py-8 text-center">No gigs yet.<br>More coming soon from Mercor and others.</p>`;
            return;
        }

        let html = '';
        data.forEach(job => {
            html += `
            <div class="card-hover bg-slate-900/50 border border-slate-800 hover:border-red-600 rounded-[2rem] p-8 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-white">${job.title}</h3>
                        <span class="text-xs bg-red-900/60 text-red-300 px-3 py-1 rounded-3xl">${(job.external_source || job.source_type || 'MERCOR').toUpperCase()}</span>
                    </div>
                    <p class="text-slate-400 text-sm mb-6 line-clamp-3">${job.description || job.short_summary || ''}</p>
                </div>
                <a href="${job.external_url || '#'}" target="_blank" 
                   class="block w-full py-3 bg-red-600 hover:bg-red-700 text-white text-center rounded-3xl text-sm font-semibold">
                    Apply Now →
                </a>
            </div>`;
        });

        container.innerHTML = html;
    } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="text-red-400 italic col-span-3 py-8 text-center">Failed to load gigs. Please refresh.</p>`;
    }
}
